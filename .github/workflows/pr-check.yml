name: PR Build Check

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Test Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build
        
      - name: Build Result
        run: echo "Build completed successfully! The PR has no conflicts." 
